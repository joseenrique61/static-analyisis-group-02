name: Maven CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: 1. Compilación
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v6

      - name: Configurar JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: pom.xml

      - name: Compilar el proyecto
        run: mvn -B clean compile

  test:
    name: 2. Pruebas unitarias
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout del código
        uses: actions/checkout@v6

      - name: Configurar JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: pom.xml

      - name: Ejecutar pruebas unitarias
        run: mvn -B test

      - name: Subir reporte de pruebas
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: surefire-reports
          if-no-files-found: warn
          path: target/surefire-reports/

  coverage:
    name: 3. Cobertura JaCoCo
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout del código
        uses: actions/checkout@v6

      - name: Configurar JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: pom.xml

      - name: Generar cobertura con JaCoCo
        run: mvn -B clean org.jacoco:jacoco-maven-plugin:prepare-agent test org.jacoco:jacoco-maven-plugin:report

      - name: Subir reporte JaCoCo
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: jacoco-report
          if-no-files-found: warn
          path: target/site/jacoco/

  checkstyle:
    name: 4. Análisis Checkstyle
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout del código
        uses: actions/checkout@v6

      - name: Configurar JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: pom.xml

      - name: Ejecutar Checkstyle
        run: mvn -B checkstyle:checkstyle

      - name: Subir reporte Checkstyle
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: checkstyle-report
          if-no-files-found: warn
          path: |
            target/site/checkstyle.html
            target/checkstyle-result.xml

  pmd:
    name: 5. Análisis PMD
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout del código
        uses: actions/checkout@v6

      - name: Configurar JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: pom.xml

      - name: Ejecutar PMD
        run: mvn -B pmd:pmd

      - name: Subir reporte PMD
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pmd-report
          if-no-files-found: warn
          path: |
            target/site/pmd.html
            target/pmd.xml